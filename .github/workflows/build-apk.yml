name: Build APK - LN SENSI X

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build (preview = APK debug, production = APK release)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do repositório
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Instalar dependências
      - name: Install dependencies
        run: npm install

      # 4. Configurar Expo / EAS CLI
      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # 5. Build do APK via EAS (profile: preview gera APK direto)
      - name: Build APK
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build \
            --platform android \
            --profile $PROFILE \
            --non-interactive \
            --output ./output/ln-sensi-x.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # 6. Upload do APK como artefato do GitHub Actions
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LN-SENSI-X-APK
          path: ./output/ln-sensi-x.apk
          retention-days: 30

      # 7. Criar Release automática quando for push na main
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4-${{ github.run_number }}
          name: "LN SENSI X v1.0.4 (Build #${{ github.run_number }})"
          body: |
            ## LN SENSI X - APK Gerado Automaticamente

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}
            **Data:** ${{ github.event.head_commit.timestamp }}

            ### Como instalar:
            1. Baixe o arquivo `ln-sensi-x.apk` abaixo
            2. No Android, vá em **Configurações > Segurança > Fontes desconhecidas** e ative
            3. Abra o arquivo APK e instale
            4. Ao abrir o app, conceda a permissão de **Sobreposição sobre outros apps**

            ### Funcionalidades:
            - Overlay flutuante roxo neon por cima do Free Fire
            - Botão TRICK draggável (100x100px)
            - Vibração ao clicar (auxílio de tiro)
            - Funciona com app em background
          files: ./output/ln-sensi-x.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
