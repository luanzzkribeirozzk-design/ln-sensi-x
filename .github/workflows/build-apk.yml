name: Build APK - LN SENSI X

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK (EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --output ./output/ln-sensi-x.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LN-SENSI-X-APK
          path: ./output/ln-sensi-x.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.4-${{ github.run_number }}
          name: "LN SENSI X v1.0.4 (Build #${{ github.run_number }})"
          body: |
            ## LN SENSI X - APK Gerado Automaticamente

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Como instalar:
            1. Baixe o arquivo `ln-sensi-x.apk` abaixo
            2. Ative **Fontes desconhecidas** no Android
            3. Instale o APK
            4. Conceda permissŃo de **SobreposińŃo sobre outros apps**
          files: ./output/ln-sensi-x.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}