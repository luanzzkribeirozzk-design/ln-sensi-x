name: Build APK Local (Gradle) - LN SENSI X

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build-local:
    name: Build APK com Gradle
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Node.js
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Java 17 (Necessário para Expo 54 / RN 0.81)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Instalar dependências npm (com legacy-peer-deps para evitar conflitos)
      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      # 6. Expo prebuild (gera o código nativo Android)
      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      # 7. Permissão para gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      # 8. Cache do Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 9. Build do APK
      - name: Build APK (Debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build APK (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # 10. Localizar e renomear APK
      - name: Locate and rename APK
        run: |
          mkdir -p output
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            find android/app/build/outputs/apk/debug -name "*.apk" -exec cp {} output/ln-sensi-x-debug.apk \;
          else
            find android/app/build/outputs/apk/release -name "*.apk" -exec cp {} output/ln-sensi-x-release.apk \;
          fi
          ls -la output/

      # 11. Upload do APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LN-SENSI-X-APK-${{ github.event.inputs.build_type }}
          path: output/*.apk
          retention-days: 30
